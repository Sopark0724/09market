server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:woorimarket
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  jwt:
    secret: woorimarket-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-ms: 86400000
  kakao:
    client-id: mock-kakao-client-id
    redirect-uri: http://localhost:5173/auth/kakao/callback

logging:
  level:
    com.woorimarket: DEBUG
    org.springframework.security: DEBUG
